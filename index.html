<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>5M Faith Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Georgia,serif;background:#f9f7ff;min-height:100vh;}
button,input,textarea,select{font-family:Georgia,serif;}
a{text-decoration:none;}
.card{background:#fff;border-radius:14px;padding:18px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,0.07);}
.hidden{display:none!important;}
input[type=text],input[type=url],input[type=date],input[type=color]{border:2px solid #e5e7eb;border-radius:10px;padding:9px 12px;font-size:14px;outline:none;color:#333;box-sizing:border-box;}

/* Rich text editor */
.rte-wrap{border-radius:10px;overflow:hidden;}
.rte-toolbar{display:flex;flex-wrap:wrap;gap:4px;padding:8px;background:#f3f4f6;border:2px solid #e5e7eb;border-bottom:none;border-radius:10px 10px 0 0;}
.rte-toolbar button{background:#fff;border:1px solid #e5e7eb;borderRadius:6px;padding:4px 8px;font-size:13px;cursor:pointer;border-radius:6px;color:#333;}
.rte-toolbar button:hover{background:#e5e7eb;}
.rte-toolbar select{border:1px solid #e5e7eb;borderRadius:6px;padding:4px 6px;font-size:12px;cursor:pointer;border-radius:6px;background:#fff;color:#333;}
.rte-toolbar input[type=color]{width:30px;height:28px;padding:2px;border:1px solid #e5e7eb;border-radius:6px;cursor:pointer;}
.rte-toolbar .sep{width:1px;background:#e5e7eb;margin:2px 2px;}
.rte-body{min-height:120px;border:2px solid #e5e7eb;border-top:none;border-radius:0 0 10px 10px;padding:12px;font-size:14px;outline:none;color:#333;line-height:1.7;overflow-y:auto;}
.rte-body:focus{border-color:#a855f7;}
.rte-body img{max-width:100%;border-radius:8px;margin:6px 0;}
.rte-body a{color:#3b82f6;text-decoration:underline;}
.rte-body iframe{width:100%;border-radius:8px;margin:6px 0;}
</style>
</head>
<body>
<div id="app"></div>
<script>
const MS=[
  {key:"mind",    label:"Mind",    emoji:"🧠",color:"#1e3a8a",light:"#dbeafe",accent:"#3b82f6",prompt:"What truth, scripture, or thought is God speaking to your mind today?",            appPrompt:"How will you renew your mind or act on this truth today?"},
  {key:"mood",    label:"Mood",    emoji:"🌤",color:"#92400e",light:"#fef3c7",accent:"#f59e0b",prompt:"How is your heart and emotional state before God right now?",                      appPrompt:"What will you do to align your emotions with God's peace today?"},
  {key:"matter",  label:"Matter",  emoji:"🌿",color:"#14532d",light:"#dcfce7",accent:"#22c55e",prompt:"What practical life area (work, health, finances, relationships) needs God's guidance?", appPrompt:"What concrete step will you take to steward this area faithfully?"},
  {key:"ministry",label:"Ministry",emoji:"❤️",color:"#c2410c",light:"#ffedd5",accent:"#f97316",prompt:"Who or what is God calling you to serve, encourage, or pour into today?",           appPrompt:"What specific act of service or love will you carry out?"},
  {key:"mystery", label:"Mystery", emoji:"🌙",color:"#3b0764",light:"#f3e8ff",accent:"#a855f7",prompt:"What aspect of God's nature, a scripture, or a spiritual question is stirring wonder in you?", appPrompt:"How will you sit with or explore this mystery — through prayer, study, or surrender?"},
];

const KEY="5m_v4";
const today=()=>new Date().toISOString().split("T")[0];
const fmtDate=d=>new Date(d).toLocaleDateString("en-SG",{weekday:"long",month:"long",day:"numeric"});
const fmtShort=d=>new Date(d).toLocaleDateString("en-SG",{weekday:"short",month:"short",day:"numeric"});
const extractVid=url=>{const m=url.match(/(?:youtu\.be\/|v=|\/embed\/|\/shorts\/)([A-Za-z0-9_-]{11})/);return m?m[1]:null;};

let state={
  view:"home",activeM:null,selDate:today(),sumTab:"overview",
  reflPeriod:"week",reflM:"mind",
  outM:"mind",outDate:today(),outText:"",outFilter:"all",outEdit:null,
  othDate:today(),othText:"",othTitle:"",othEdit:null,
  resUrl:"",resDesc:"",resEditId:null,
  openWA:{},openRfl:{},openOut:{},openOth:{},
  expFrom:null,expTo:null,expSections:null,expOrg:"category",
  data:loadData()
};

function loadData(){try{return JSON.parse(localStorage.getItem(KEY)||"{}");}catch{return{};}}
function save(){try{localStorage.setItem(KEY,JSON.stringify(state.data));}catch{}}
function set(obj){Object.assign(state,obj);render();}
function setData(d){state.data=d;save();render();}
function getEntry(mKey,date){return state.data[date||state.selDate]?.[mKey]||{thoughts:"",applications:[]};}
function updField(mKey,field,val){
  const d=state.data,s=state.selDate;
  d[s]=d[s]||{};d[s][mKey]=d[s][mKey]||{thoughts:"",applications:[]};
  d[s][mKey][field]=val;save();
}
function getOthers(){return state.data.__others||[];}
function getOutcomes(){return state.data.__outcomes||[];}
function getResources(){return state.data.__resources||[];}
function saveList(key,list){state.data[key]=list;save();render();}
function getWeekDates(){const d=new Date(),day=d.getDay();return Array.from({length:7},(_,i)=>{const x=new Date(d);x.setDate(d.getDate()-day+i);return x.toISOString().split("T")[0];});}
function getMonthDates(){const d=new Date(),y=d.getFullYear(),mo=d.getMonth(),days=new Date(y,mo+1,0).getDate();return Array.from({length:days},(_,i)=>new Date(y,mo,i+1).toISOString().split("T")[0]);}
function tog(mapKey,k){state[mapKey]={...state[mapKey],[k]:!state[mapKey][k]};render();}

/* ── DOM helpers ── */
function el(tag,attrs,children){
  const e=document.createElement(tag);
  for(const[k,v] of Object.entries(attrs||{})){
    if(k==="style"&&typeof v==="object"){Object.assign(e.style,v);}
    else if(k.startsWith("on")&&typeof v==="function"){e.addEventListener(k.slice(2).toLowerCase(),v);}
    else if(k==="className"){e.className=v;}
    else{e.setAttribute(k,v);}
  }
  if(children){(Array.isArray(children)?children:[children]).forEach(c=>{if(c==null||c===false)return;e.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(c):c);});}
  return e;
}
function backBtn(label,onclick){return el("button",{style:{background:"rgba(255,255,255,0.2)",border:"none",color:"#fff",borderRadius:"8px",padding:"6px 14px",cursor:"pointer",marginBottom:"12px",fontSize:"14px"},onClick:onclick},label||"← Back");}
function pillBtn(active,color,light,accent,label,onclick){return el("button",{style:{padding:"7px 14px",borderRadius:"99px",border:`2px solid ${active?accent:"#e5e7eb"}`,background:active?light:"#fff",color:active?color:"#888",fontWeight:active?"bold":"normal",fontSize:"13px",cursor:"pointer"},onClick:onclick},label);}
function colRow(isOpen,onToggle,accent,bg,leftEl,rightEls,contentEl){
  const header=el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",background:isOpen?bg:"#f9fafb",cursor:"pointer"},onClick:onToggle},[
    el("div",{style:{flex:1,minWidth:0}},leftEl),
    el("div",{style:{display:"flex",gap:"6px",alignItems:"center",flexShrink:0}},[...(rightEls||[]),el("span",{style:{color:"#aaa",fontSize:"14px"}},isOpen?"▲":"▼")])
  ]);
  const wrap=el("div",{style:{borderRadius:"10px",border:"1px solid #e5e7eb",marginBottom:"10px",overflow:"hidden"}},[header]);
  if(isOpen){wrap.appendChild(el("div",{style:{padding:"12px 14px",borderTop:`2px solid ${accent}`}},contentEl));}
  return wrap;
}

/* ══════════════════════════
   RICH TEXT EDITOR
══════════════════════════ */
function createRTE(initialHTML, onchange, accentColor){
  const wrap=el("div",{className:"rte-wrap"});
  const toolbar=el("div",{className:"rte-toolbar"});

  // Font family
  const fontSel=el("select",{title:"Font",onChange:e=>{document.execCommand("fontName",false,e.target.value);}},null);
  [["Georgia","Georgia"],["Arial","Arial"],["Times New Roman","Times New Roman"],["Courier New","Courier New"],["Verdana","Verdana"],["Trebuchet MS","Trebuchet MS"]].forEach(([val,lab])=>{
    const o=el("option",{value:val},lab);o.style.fontFamily=val;fontSel.appendChild(o);
  });
  toolbar.appendChild(fontSel);

  // Font size
  const sizeSel=el("select",{title:"Size",onChange:e=>{document.execCommand("fontSize",false,e.target.value);}},null);
  [[1,"XS"],[2,"S"],[3,"M"],[4,"L"],[5,"XL"],[6,"XXL"]].forEach(([val,lab])=>{
    sizeSel.appendChild(el("option",{value:val},lab));
  });
  sizeSel.value=3;
  toolbar.appendChild(sizeSel);

  toolbar.appendChild(el("div",{className:"sep"},null));

  // Bold Italic Underline
  const fmt=[["B","bold","<b>B</b>"],["I","italic","<i>I</i>"],["U","underline","<u>U</u>"]];
  fmt.forEach(([,cmd,html])=>{
    const b=document.createElement("button");b.innerHTML=html;b.title=cmd;
    b.addEventListener("click",e=>{e.preventDefault();document.execCommand(cmd,false,null);body.focus();});
    toolbar.appendChild(b);
  });

  toolbar.appendChild(el("div",{className:"sep"},null));

  // Text colour
  const colorInp=el("input",{type:"color",title:"Text colour",value:"#000000"},null);
  colorInp.addEventListener("input",e=>{document.execCommand("foreColor",false,e.target.value);body.focus();});
  toolbar.appendChild(colorInp);

  // Highlight colour
  const hlInp=el("input",{type:"color",title:"Highlight",value:"#ffff00"},null);
  hlInp.addEventListener("input",e=>{document.execCommand("hiliteColor",false,e.target.value);body.focus();});
  toolbar.appendChild(el("span",{style:{fontSize:"11px",color:"#888",alignSelf:"center"}},"🖊"));
  toolbar.appendChild(hlInp);

  toolbar.appendChild(el("div",{className:"sep"},null));

  // Lists
  const ulBtn=document.createElement("button");ulBtn.innerHTML="≡•";ulBtn.title="Bullet list";
  ulBtn.addEventListener("click",e=>{e.preventDefault();document.execCommand("insertUnorderedList",false,null);body.focus();});
  toolbar.appendChild(ulBtn);
  const olBtn=document.createElement("button");olBtn.innerHTML="1.";olBtn.title="Numbered list";
  olBtn.addEventListener("click",e=>{e.preventDefault();document.execCommand("insertOrderedList",false,null);body.focus();});
  toolbar.appendChild(olBtn);

  toolbar.appendChild(el("div",{className:"sep"},null));

  // Link
  const linkBtn=document.createElement("button");linkBtn.innerHTML="🔗";linkBtn.title="Insert link";
  linkBtn.addEventListener("click",e=>{
    e.preventDefault();
    const url=prompt("Enter URL (include https://):");
    if(url){document.execCommand("createLink",false,url);
      // make link open in new tab
      body.querySelectorAll("a").forEach(a=>{a.target="_blank";a.rel="noopener noreferrer";});
    }
    body.focus();
  });
  toolbar.appendChild(linkBtn);

  // Image upload
  const imgBtn=document.createElement("button");imgBtn.innerHTML="🖼";imgBtn.title="Insert image";
  imgBtn.addEventListener("click",e=>{e.preventDefault();imgInput.click();});
  toolbar.appendChild(imgBtn);
  const imgInput=el("input",{type:"file",accept:"image/*",style:{display:"none"}},null);
  imgInput.addEventListener("change",ev=>{
    const file=ev.target.files[0];if(!file)return;
    if(file.size>2*1024*1024){alert("Image too large. Please use an image under 2MB.");return;}
    const reader=new FileReader();
    reader.onload=e=>{document.execCommand("insertHTML",false,`<img src="${e.target.result}" style="max-width:100%;border-radius:8px;margin:6px 0;"/>`);onchange(body.innerHTML);};
    reader.readAsDataURL(file);ev.target.value="";
  });
  toolbar.appendChild(imgInput);

  // YouTube embed
  const ytBtn=document.createElement("button");ytBtn.innerHTML="▶";ytBtn.title="Embed YouTube";
  ytBtn.addEventListener("click",e=>{
    e.preventDefault();
    const url=prompt("Enter YouTube URL:");
    if(!url)return;
    const vid=extractVid(url);
    if(!vid){alert("Invalid YouTube URL.");return;}
    document.execCommand("insertHTML",false,`<br/><iframe width="100%" height="200" src="https://www.youtube.com/embed/${vid}" frameborder="0" allowfullscreen style="border-radius:8px;margin:6px 0;"></iframe><br/>`);
    onchange(body.innerHTML);
  });
  toolbar.appendChild(ytBtn);

  // Clear formatting
  toolbar.appendChild(el("div",{className:"sep"},null));
  const clearBtn=document.createElement("button");clearBtn.innerHTML="✕";clearBtn.title="Clear formatting";
  clearBtn.addEventListener("click",e=>{e.preventDefault();document.execCommand("removeFormat",false,null);body.focus();});
  toolbar.appendChild(clearBtn);

  // Body
  const body=el("div",{className:"rte-body"},null);
  body.contentEditable="true";
  body.innerHTML=initialHTML||"";
  if(accentColor){body.style.borderColor=accentColor;}
  body.addEventListener("focus",()=>{if(accentColor)body.style.borderColor=accentColor;});
  body.addEventListener("input",()=>onchange(body.innerHTML));

  wrap.appendChild(toolbar);
  wrap.appendChild(body);
  return {wrap,body};
}

/* ════════════════════════ HOME ════════════════════════ */
function renderHome(){
  const isToday=state.selDate===today();
  const completedToday=MS.filter(m=>{const e=getEntry(m.key);return e.thoughts?.trim()||e.applications?.length>0;}).length;
  const wrap=el("div",{style:{minHeight:"100vh",background:"#f9f7ff"}});
  const prevBtn=el("button",{style:{background:"rgba(255,255,255,0.2)",border:"none",color:"#fff",borderRadius:"8px",padding:"6px 12px",cursor:"pointer",fontSize:"16px"},onClick:()=>{const d=new Date(state.selDate);d.setDate(d.getDate()-1);set({selDate:d.toISOString().split("T")[0]});}},"‹");
  const nextBtn=el("button",{style:{background:"rgba(255,255,255,0.2)",border:"none",color:state.selDate>=today()?"rgba(255,255,255,0.3)":"#fff",borderRadius:"8px",padding:"6px 12px",cursor:state.selDate>=today()?"default":"pointer",fontSize:"16px"},onClick:()=>{if(state.selDate>=today())return;const d=new Date(state.selDate);d.setDate(d.getDate()+1);set({selDate:d.toISOString().split("T")[0]});}},"›");
  wrap.appendChild(el("div",{style:{background:"linear-gradient(135deg,#1e3a8a 0%,#3b0764 100%)",color:"#fff",padding:"24px 16px 20px",textAlign:"center"}},[
    el("h1",{style:{margin:0,fontSize:"26px",letterSpacing:"1px"}},"✝ 5M Faith Tracker"),
    el("p",{style:{margin:"6px 0 16px",opacity:"0.8",fontSize:"13px"}},"Mind · Mood · Matter · Ministry · Mystery"),
    el("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",gap:"10px"}},[prevBtn,el("span",{style:{fontSize:"14px",fontWeight:"bold"}},(isToday?"Today — ":"")+fmtDate(state.selDate)),nextBtn])
  ]));
  const inner=el("div",{style:{padding:"16px",maxWidth:"600px",margin:"0 auto"}});
  if(isToday&&completedToday<5)inner.appendChild(el("div",{style:{background:"#fef3c7",border:"1px solid #f59e0b",borderRadius:"12px",padding:"10px 14px",marginBottom:"8px",fontSize:"13px",color:"#92400e"}},`🔔 You've completed ${completedToday}/5 sections today. Keep going!`));
  if(isToday&&completedToday===5)inner.appendChild(el("div",{style:{background:"#dcfce7",border:"1px solid #22c55e",borderRadius:"12px",padding:"10px 14px",marginBottom:"8px",fontSize:"13px",color:"#14532d"}},"🎉 All 5Ms done for today! Well done."));
  MS.forEach(m=>{
    const entry=getEntry(m.key);
    const hasT=!!(entry.thoughts&&entry.thoughts.replace(/<[^>]*>/g,"").trim());
    const appN=entry.applications?.length||0,chkN=entry.applications?.filter(a=>a.checked).length||0,filled=hasT||appN>0;
    inner.appendChild(el("div",{style:{background:"#fff",borderRadius:"16px",marginBottom:"12px",overflow:"hidden",boxShadow:"0 2px 10px rgba(0,0,0,0.07)",cursor:"pointer",border:`2px solid ${filled?m.accent:"#e5e7eb"}`,display:"flex"},onClick:()=>set({view:"detail",activeM:m.key})},[
      el("div",{style:{background:m.color,width:"70px",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"16px 0"}},[el("span",{style:{fontSize:"26px"}},m.emoji),el("span",{style:{color:"#fff",fontSize:"12px",fontWeight:"bold",marginTop:"4px"}},m.label)]),
      el("div",{style:{flex:1,padding:"14px 16px"}},[
        el("p",{style:{margin:"0 0 8px",fontSize:"12px",color:"#888",lineHeight:"1.5"}},m.prompt.slice(0,70)+"…"),
        el("div",{style:{display:"flex",gap:"8px",flexWrap:"wrap"}},[
          el("span",{style:{fontSize:"11px",padding:"3px 10px",borderRadius:"99px",background:hasT?m.light:"#f3f4f6",color:hasT?m.color:"#999",fontWeight:"bold"}},hasT?"✓ Reflection":"○ Reflection"),
          el("span",{style:{fontSize:"11px",padding:"3px 10px",borderRadius:"99px",background:appN>0?m.light:"#f3f4f6",color:appN>0?m.color:"#999",fontWeight:"bold"}},appN>0?`✓ ${chkN}/${appN} steps`:"○ Application"),
        ])
      ]),
      el("div",{style:{display:"flex",alignItems:"center",paddingRight:"14px"}},el("span",{style:{color:"#ccc",fontSize:"20px"}},"›"))
    ]));
  });
  inner.appendChild(el("button",{style:{width:"100%",padding:"14px",background:"linear-gradient(135deg,#3b0764,#1e3a8a)",color:"#fff",border:"none",borderRadius:"14px",fontSize:"15px",cursor:"pointer",marginTop:"8px",letterSpacing:"0.5px"},onClick:()=>set({view:"progress",sumTab:"overview"})},"📊 View Progress"));
  inner.appendChild(el("button",{style:{width:"100%",padding:"14px",background:"linear-gradient(135deg,#14532d,#22c55e)",color:"#fff",border:"none",borderRadius:"14px",fontSize:"15px",cursor:"pointer",marginTop:"10px",letterSpacing:"0.5px"},onClick:()=>set({view:"resources"})},"📺 Resources"));
  wrap.appendChild(inner);
  return wrap;
}

/* ════════════════════════ DETAIL ════════════════════════ */
function renderDetail(){
  const m=MS.find(x=>x.key===state.activeM);
  const entry=getEntry(m.key);
  const wrap=el("div",{style:{minHeight:"100vh",background:m.light}});
  wrap.appendChild(el("div",{style:{background:m.color,color:"#fff",padding:"20px 16px 16px"}},[
    backBtn("← Back",()=>set({view:"home"})),
    el("div",{style:{fontSize:"36px"}},m.emoji),
    el("h2",{style:{margin:"4px 0 0",fontSize:"24px"}},m.label),
    el("p",{style:{margin:"4px 0 0",opacity:"0.85",fontSize:"13px"}},state.selDate)
  ]));
  const inner=el("div",{style:{padding:"16px",maxWidth:"600px",margin:"0 auto"}});

  // Reflection card with RTE
  const reflCard=el("div",{className:"card"});
  reflCard.appendChild(el("p",{style:{color:m.color,fontWeight:"bold",fontSize:"14px",marginBottom:"8px"}},"✦ Today's Reflection"));
  reflCard.appendChild(el("p",{style:{color:"#444",fontSize:"14px",lineHeight:"1.6",margin:"0 0 12px"}},m.prompt));
  const {wrap:rteWrap}=createRTE(entry.thoughts||"",html=>{updField(m.key,"thoughts",html);},m.accent);
  reflCard.appendChild(rteWrap);
  inner.appendChild(reflCard);

  // Application card
  const appCard=el("div",{className:"card"});
  appCard.appendChild(el("p",{style:{color:m.color,fontWeight:"bold",fontSize:"14px",marginBottom:"4px"}},"✦ Application Steps"));
  appCard.appendChild(el("p",{style:{color:"#888",fontSize:"13px",lineHeight:"1.5",margin:"0 0 14px"}},m.appPrompt));
  renderCheckboxList(appCard,entry.applications||[],m,m.key);
  inner.appendChild(appCard);
  wrap.appendChild(inner);
  return wrap;
}

function renderCheckboxList(parent,items,m,mKey){
  const listWrap=el("div",{});
  items.forEach((a,i)=>{
    listWrap.appendChild(el("div",{style:{display:"flex",alignItems:"flex-start",gap:"10px",marginBottom:"10px",padding:"10px 12px",background:a.checked?m.light:"#f9fafb",borderRadius:"10px",border:`1px solid ${a.checked?m.accent:"#e5e7eb"}`}},[
      el("div",{style:{width:"20px",height:"20px",borderRadius:"5px",border:`2px solid ${a.checked?m.accent:"#d1d5db"}`,background:a.checked?m.accent:"#fff",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:"0",marginTop:"1px"},onClick:()=>{const apps=[...getEntry(mKey).applications];apps[i]={...apps[i],checked:!apps[i].checked};updField(mKey,"applications",apps);render();}},a.checked?el("span",{style:{color:"#fff",fontSize:"13px",lineHeight:"1"}},"✓"):null),
      el("span",{style:{flex:1,fontSize:"14px",color:a.checked?"#6b7280":"#333",textDecoration:a.checked?"line-through":"none",lineHeight:"1.5"}},a.text),
      el("button",{style:{background:"none",border:"none",color:"#d1d5db",cursor:"pointer",fontSize:"16px",padding:"0",lineHeight:"1",flexShrink:"0"},onClick:()=>{const apps=getEntry(mKey).applications.filter((_,j)=>j!==i);updField(mKey,"applications",apps);render();}},"×")
    ]));
  });
  const inputRow=el("div",{style:{display:"flex",gap:"8px",marginTop:"4px"}});
  const inp=el("input",{type:"text",placeholder:"Add an application step...",style:{flex:1,border:`2px solid ${m.accent}`,borderRadius:"10px",padding:"9px 12px",fontSize:"14px",outline:"none",color:"#333"}},null);
  function addApp(){const t=inp.value.trim();if(!t)return;const apps=[...getEntry(mKey).applications,{id:Date.now(),text:t,checked:false}];updField(mKey,"applications",apps);inp.value="";render();}
  inp.addEventListener("keydown",e=>{if(e.key==="Enter")addApp();});
  inputRow.appendChild(inp);
  inputRow.appendChild(el("button",{style:{background:m.accent,color:"#fff",border:"none",borderRadius:"10px",padding:"9px 16px",fontSize:"14px",cursor:"pointer",fontWeight:"bold"},onClick:addApp},"+"));
  parent.appendChild(listWrap);
  parent.appendChild(inputRow);
}

/* ════════════════════════ PROGRESS ════════════════════════ */
function renderProgress(){
  const wrap=el("div",{style:{minHeight:"100vh",background:"#f8f5ff"}});
  const hdr=el("div",{style:{background:"#3b0764",color:"#fff",padding:"20px 16px 0"}});
  hdr.appendChild(backBtn("← Back",()=>set({view:"home"})));
  hdr.appendChild(el("h2",{style:{margin:0,fontSize:"22px"}},"📊 Progress"));
  hdr.appendChild(el("p",{style:{margin:"4px 0 16px",opacity:"0.8",fontSize:"13px"}},"Your faith journey overview"));
  const tabRow=el("div",{style:{display:"flex",gap:"4px",overflowX:"auto"}});
  ["overview","reflections","outcomes","others","export"].forEach(t=>{
    tabRow.appendChild(el("button",{style:{padding:"10px 16px",background:state.sumTab===t?"#fff":"transparent",color:state.sumTab===t?"#3b0764":"rgba(255,255,255,0.75)",border:"none",borderRadius:"10px 10px 0 0",cursor:"pointer",fontSize:"13px",fontWeight:state.sumTab===t?"bold":"normal",whiteSpace:"nowrap"},onClick:()=>set({sumTab:t})},t.charAt(0).toUpperCase()+t.slice(1)));
  });
  hdr.appendChild(tabRow);
  wrap.appendChild(hdr);
  const inner=el("div",{style:{padding:"16px",maxWidth:"600px",margin:"0 auto"}});
  if(state.sumTab==="overview")renderOverview(inner);

  resBtnRow.appendChild(el("button",{style:{flex:1,padding:"11px 0",background:"#14532d",color:"#fff",border:"none",borderRadius:"10px",fontSize:"14px",cursor:"pointer",fontWeight:"bold"},onClick:()=>{const vid=extractVid(state.resUrl.trim());if(!vid){alert("Please enter a valid YouTube URL.");return;}const list=getResources();if(state.resEditId!==null){saveList("__resources",list.map(r=>r.id===state.resEditId?{...r,url:state.resUrl.trim(),vid,desc:state.resDesc.trim()}:r));set({resEditId:null,resUrl:"",resDesc:""});}else{saveList("__resources",[...list,{id:Date.now(),url:state.resUrl.trim(),vid,desc:state.resDesc.trim()}]);set({resUrl:"",resDesc:""});}},},state.resEditId!==null?"Save Changes":"Add Video"));
  if(state.resEditId!==null)resBtnRow.appendChild(el("button",{style:{padding:"11px 16px",background:"#f3f4f6",color:"#666",border:"none",borderRadius:"10px",fontSize:"14px",cursor:"pointer"},onClick:()=>set({resEditId:null,resUrl:"",resDesc:""})},"Cancel"));
  formCard.appendChild(resBtnRow);inner.appendChild(formCard);
  if(resources.length===0)inner.appendChild(el("div",{style:{textAlign:"center",padding:"40px 0",color:"#999"}},[el("p",{style:{fontSize:"32px",marginBottom:"8px"}},"📺"),el("p",{style:{fontSize:"14px",fontStyle:"italic"}},"No videos yet. Add a YouTube link above!")]));
  else resources.forEach(r=>{
    const card=el("div",{style:{background:"#fff",borderRadius:"14px",marginBottom:"12px",overflow:"hidden",boxShadow:"0 2px 8px rgba(0,0,0,0.07)",border:"2px solid #e5e7eb"}});
    card.appendChild(el("div",{style:{display:"flex",gap:"12px",padding:"14px 14px 10px",alignItems:"center"}},[el("div",{style:{flexShrink:"0",width:"52px",height:"52px",borderRadius:"12px",background:"#dcfce7",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"26px"}},"▶️"),el("div",{style:{flex:1,minWidth:0}},[el("p",{style:{margin:"0 0 4px",fontSize:"14px",color:"#333",fontWeight:"bold",lineHeight:"1.4"}},r.desc||"Untitled video"),el("p",{style:{margin:0,fontSize:"11px",color:"#86efac",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},r.url)])]));
    const btnBar=el("div",{style:{display:"flex",borderTop:"1px solid #f0fdf4"}});
    btnBar.appendChild(el("a",{href:r.url,style:{flex:1,padding:"11px 0",background:"#14532d",color:"#fff",fontSize:"12px",fontWeight:"bold",textAlign:"center",display:"block"}},"▶ Open"));
    btnBar.appendChild(el("div",{style:{width:"1px",background:"#166534"}},null));
    btnBar.appendChild(el("a",{href:r.url,target:"_blank",rel:"noopener noreferrer",style:{flex:1,padding:"11px 0",background:"#166534",color:"#fff",fontSize:"12px",fontWeight:"bold",textAlign:"center",display:"block"}},"▶ New Tab"));
    btnBar.appendChild(el("div",{style:{width:"1px",background:"#e5e7eb"}},null));
    btnBar.appendChild(el("button",{style:{flex:1,padding:"11px 0",background:"#f0fdf4",color:"#14532d",border:"none",fontSize:"12px",cursor:"pointer"},onClick:()=>set({resEditId:r.id,resUrl:r.url,resDesc:r.desc})},"Edit"));
    btnBar.appendChild(el("div",{style:{width:"1px",background:"#e5e7eb"}},null));
    btnBar.appendChild(el("button",{style:{flex:1,padding:"11px 0",background:"#f0fdf4",color:"#ef4444",border:"none",fontSize:"12px",cursor:"pointer"},onClick:()=>saveList("__resources",resources.filter(x=>x.id!==r.id))},"Delete"));
    card.appendChild(btnBar);inner.appendChild(card);
  });
  wrap.appendChild(inner);
  return wrap;
}

/* ════════════════════════ MAIN RENDER ════════════════════════ */
function render(){
  const app=document.getElementById("app");
  app.innerHTML="";
  if(state.view==="home")app.appendChild(renderHome());
  else if(state.view==="detail")app.appendChild(renderDetail());
  else if(state.view==="progress")app.appendChild(renderProgress());
  else if(state.view==="resources")app.appendChild(renderResources());
}
render();
</script>
</body>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>5M Faith Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Georgia,serif;background:#f9f7ff;min-height:100vh;}
button,input,textarea{font-family:Georgia,serif;}
a{text-decoration:none;}
.card{background:#fff;border-radius:14px;padding:18px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,0.07);}
.btn{border:none;border-radius:10px;padding:11px 0;font-size:14px;cursor:pointer;font-family:Georgia,serif;font-weight:bold;width:100%;}
.pill{padding:7px 14px;border-radius:99px;font-size:13px;cursor:pointer;font-family:Georgia,serif;}
.hidden{display:none!important;}
input[type=text],input[type=url],input[type=date],textarea{width:100%;border:2px solid #e5e7eb;border-radius:10px;padding:9px 12px;font-size:14px;outline:none;color:#333;box-sizing:border-box;}
</style>
</head>
<body>
<div id="app"></div>
<script>
const MS=[
  {key:"mind",    label:"Mind",    emoji:"🧠",color:"#1e3a8a",light:"#dbeafe",accent:"#3b82f6",prompt:"What truth, scripture, or thought is God speaking to your mind today?",            appPrompt:"How will you renew your mind or act on this truth today?"},
  {key:"mood",    label:"Mood",    emoji:"🌤",color:"#92400e",light:"#fef3c7",accent:"#f59e0b",prompt:"How is your heart and emotional state before God right now?",                      appPrompt:"What will you do to align your emotions with God's peace today?"},
  {key:"matter",  label:"Matter",  emoji:"🌿",color:"#14532d",light:"#dcfce7",accent:"#22c55e",prompt:"What practical life area (work, health, finances, relationships) needs God's guidance?", appPrompt:"What concrete step will you take to steward this area faithfully?"},
  {key:"ministry",label:"Ministry",emoji:"❤️",color:"#c2410c",light:"#ffedd5",accent:"#f97316",prompt:"Who or what is God calling you to serve, encourage, or pour into today?",           appPrompt:"What specific act of service or love will you carry out?"},
  {key:"mystery", label:"Mystery", emoji:"🌙",color:"#3b0764",light:"#f3e8ff",accent:"#a855f7",prompt:"What aspect of God's nature, a scripture, or a spiritual question is stirring wonder in you?", appPrompt:"How will you sit with or explore this mystery — through prayer, study, or surrender?"},
];

const KEY="5m_v4";
const today=()=>new Date().toISOString().split("T")[0];
const fmtDate=d=>new Date(d).toLocaleDateString("en-SG",{weekday:"long",month:"long",day:"numeric"});
const fmtShort=d=>new Date(d).toLocaleDateString("en-SG",{weekday:"short",month:"short",day:"numeric"});

let state={
  view:"home", activeM:null, selDate:today(), sumTab:"overview",
  reflPeriod:"week", reflM:"mind",
  outM:"mind", outDate:today(), outText:"", outFilter:"all", outEdit:null,
  othDate:today(), othText:"", othTitle:"", othEdit:null,
  resUrl:"", resDesc:"", resEditId:null,
  openWA:{}, openRfl:{}, openOut:{}, openOth:{},
  data: loadData()
};

function loadData(){try{return JSON.parse(localStorage.getItem(KEY)||"{}");}catch{return{};}}
function save(){try{localStorage.setItem(KEY,JSON.stringify(state.data));}catch{}}
function set(obj){Object.assign(state,obj);render();}
function setData(d){state.data=d;save();render();}

function getEntry(mKey,date){return state.data[date||state.selDate]?.[mKey]||{thoughts:"",applications:[]};}
function updField(mKey,field,val){
  const d=state.data, s=state.selDate;
  d[s]=d[s]||{};
  d[s][mKey]=d[s][mKey]||{thoughts:"",applications:[]};
  d[s][mKey][field]=val;
  save(); render();
}
function getOthers(){return state.data.__others||[];}
function getOutcomes(){return state.data.__outcomes||[];}
function getResources(){return state.data.__resources||[];}
function saveList(key,list){state.data[key]=list;save();render();}

function getWeekDates(){const d=new Date(),day=d.getDay();return Array.from({length:7},(_,i)=>{const x=new Date(d);x.setDate(d.getDate()-day+i);return x.toISOString().split("T")[0];});}
function getMonthDates(){const d=new Date(),y=d.getFullYear(),mo=d.getMonth(),days=new Date(y,mo+1,0).getDate();return Array.from({length:days},(_,i)=>new Date(y,mo,i+1).toISOString().split("T")[0]);}

function extractVid(url){const m=url.match(/(?:youtu\.be\/|v=|\/embed\/|\/shorts\/)([A-Za-z0-9_-]{11})/);return m?m[1]:null;}

function tog(mapKey,k){state[mapKey]={...state[mapKey],[k]:!state[mapKey][k]};render();}

/* ── render helpers ── */
function el(tag,attrs,children){
  const e=document.createElement(tag);
  for(const[k,v] of Object.entries(attrs||{})){
    if(k==="style"&&typeof v==="object"){Object.assign(e.style,v);}
    else if(k.startsWith("on")&&typeof v==="function"){e.addEventListener(k.slice(2).toLowerCase(),v);}
    else if(k==="className"){e.className=v;}
    else{e.setAttribute(k,v);}
  }
  if(children){
    (Array.isArray(children)?children:[children]).forEach(c=>{
      if(c==null||c===false)return;
      e.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(c):c);
    });
  }
  return e;
}

function backBtn(label,onclick){return el("button",{style:{background:"rgba(255,255,255,0.2)",border:"none",color:"#fff",borderRadius:"8px",padding:"6px 14px",cursor:"pointer",marginBottom:"12px",fontSize:"14px"},onClick:onclick},label||"← Back");}

function pillBtn(active,color,light,accent,label,onclick){
  return el("button",{className:"pill",style:{border:`2px solid ${active?accent:"#e5e7eb"}`,background:active?light:"#fff",color:active?color:"#888",fontWeight:active?"bold":"normal"},onClick:onclick},label);
}

function colRow(isOpen,onToggle,accent,bg,leftEl,rightEls,contentEl){
  const header=el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",background:isOpen?bg:"#f9fafb",cursor:"pointer"},onClick:onToggle},[
    el("div",{style:{flex:1,minWidth:0}},leftEl),
    el("div",{style:{display:"flex",gap:"6px",alignItems:"center",flexShrink:0}},[...(rightEls||[]),el("span",{style:{color:"#aaa",fontSize:"14px"}},isOpen?"▲":"▼")])
  ]);
  const wrap=el("div",{style:{borderRadius:"10px",border:"1px solid #e5e7eb",marginBottom:"10px",overflow:"hidden"}},[header]);
  if(isOpen){
    const body=el("div",{style:{padding:"12px 14px",borderTop:`2px solid ${accent}`}},contentEl);
    wrap.appendChild(body);
  }
  return wrap;
}

function checkItem(a,accent,light){
  return el("div",{style:{display:"flex",alignItems:"flex-start",gap:"10px",marginBottom:"10px",padding:"10px 12px",background:a.checked?light:"#f9fafb",borderRadius:"10px",border:`1px solid ${a.checked?accent:"#e5e7eb"}`}},[
    el("div",{style:{width:"20px",height:"20px",borderRadius:"5px",border:`2px solid ${a.checked?accent:"#d1d5db"}`,background:a.checked?accent:"#fff",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:"0",marginTop:"1px"},onClick:()=>{
      // handled by parent
    }},a.checked?el("span",{style:{color:"#fff",fontSize:"13px",lineHeight:"1"}},"✓"):null),
    el("span",{style:{flex:1,fontSize:"14px",color:a.checked?"#6b7280":"#333",textDecoration:a.checked?"line-through":"none",lineHeight:"1.5"}},a.text),
  ]);
}

/* ════════════ VIEWS ════════════ */

function renderHome(){
  const isToday=state.selDate===today();
  const completedToday=MS.filter(m=>{const e=getEntry(m.key);return e.thoughts?.trim()||e.applications?.length>0;}).length;
  const wrap=el("div",{style:{minHeight:"100vh",background:"#f9f7ff"}});

  // header
  const prevBtn=el("button",{style:{background:"rgba(255,255,255,0.2)",border:"none",color:"#fff",borderRadius:"8px",padding:"6px 12px",cursor:"pointer",fontSize:"16px"},onClick:()=>{const d=new Date(state.selDate);d.setDate(d.getDate()-1);set({selDate:d.toISOString().split("T")[0]});}},"‹");
  const nextBtn=el("button",{style:{background:"rgba(255,255,255,0.2)",border:"none",color:state.selDate>=today()?"rgba(255,255,255,0.3)":"#fff",borderRadius:"8px",padding:"6px 12px",cursor:state.selDate>=today()?"default":"pointer",fontSize:"16px"},onClick:()=>{if(state.selDate>=today())return;const d=new Date(state.selDate);d.setDate(d.getDate()+1);set({selDate:d.toISOString().split("T")[0]});}},"›");
  const header=el("div",{style:{background:"linear-gradient(135deg,#1e3a8a 0%,#3b0764 100%)",color:"#fff",padding:"24px 16px 20px",textAlign:"center"}},[
    el("h1",{style:{margin:0,fontSize:"26px",letterSpacing:"1px"}},"✝ 5M Faith Tracker"),
    el("p",{style:{margin:"6px 0 16px",opacity:"0.8",fontSize:"13px"}},"Mind · Mood · Matter · Ministry · Mystery"),
    el("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",gap:"10px"}},[
      prevBtn,
      el("span",{style:{fontSize:"14px",fontWeight:"bold"}},(isToday?"Today — ":"")+fmtDate(state.selDate)),
      nextBtn
    ])
  ]);
  wrap.appendChild(header);

  const inner=el("div",{style:{padding:"16px",maxWidth:"600px",margin:"0 auto"}});

  if(isToday&&completedToday<5){
    inner.appendChild(el("div",{style:{background:"#fef3c7",border:"1px solid #f59e0b",borderRadius:"12px",padding:"10px 14px",marginBottom:"8px",fontSize:"13px",color:"#92400e"}},`🔔 You've completed ${completedToday}/5 sections today. Keep going!`));
  }
  if(isToday&&completedToday===5){
    inner.appendChild(el("div",{style:{background:"#dcfce7",border:"1px solid #22c55e",borderRadius:"12px",padding:"10px 14px",marginBottom:"8px",fontSize:"13px",color:"#14532d"}},"🎉 All 5Ms done for today! Well done."));
  }

  MS.forEach(m=>{
    const entry=getEntry(m.key);
    const hasT=!!entry.thoughts?.trim();
    const appN=entry.applications?.length||0;
    const chkN=entry.applications?.filter(a=>a.checked).length||0;
    const filled=hasT||appN>0;
    const card=el("div",{style:{background:"#fff",borderRadius:"16px",marginBottom:"12px",overflow:"hidden",boxShadow:"0 2px 10px rgba(0,0,0,0.07)",cursor:"pointer",border:`2px solid ${filled?m.accent:"#e5e7eb"}`,display:"flex"},onClick:()=>set({view:"detail",activeM:m.key})},[
      el("div",{style:{background:m.color,width:"70px",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"16px 0"}},[
        el("span",{style:{fontSize:"26px"}},m.emoji),
        el("span",{style:{color:"#fff",fontSize:"12px",fontWeight:"bold",marginTop:"4px"}},m.label)
      ]),
      el("div",{style:{flex:1,padding:"14px 16px"}},[
        el("p",{style:{margin:"0 0 8px",fontSize:"12px",color:"#888",lineHeight:"1.5"}},m.prompt.slice(0,70)+"…"),
        el("div",{style:{display:"flex",gap:"8px",flexWrap:"wrap"}},[
          el("span",{style:{fontSize:"11px",padding:"3px 10px",borderRadius:"99px",background:hasT?m.light:"#f3f4f6",color:hasT?m.color:"#999",fontWeight:"bold"}},hasT?"✓ Reflection":"○ Reflection"),
          el("span",{style:{fontSize:"11px",padding:"3px 10px",borderRadius:"99px",background:appN>0?m.light:"#f3f4f6",color:appN>0?m.color:"#999",fontWeight:"bold"}},appN>0?`✓ ${chkN}/${appN} steps`:"○ Application"),
        ])
      ]),
      el("div",{style:{display:"flex",alignItems:"center",paddingRight:"14px"}},el("span",{style:{color:"#ccc",fontSize:"20px"}},"›"))
    ]);
    inner.appendChild(card);
  });

  inner.appendChild(el("button",{style:{width:"100%",padding:"14px",background:"linear-gradient(135deg,#3b0764,#1e3a8a)",color:"#fff",border:"none",borderRadius:"14px",fontSize:"15px",cursor:"pointer",marginTop:"8px",letterSpacing:"0.5px"},onClick:()=>set({view:"progress",sumTab:"overview"})},"📊 View Progress"));
  inner.appendChild(el("button",{style:{width:"100%",padding:"14px",background:"linear-gradient(135deg,#14532d,#22c55e)",color:"#fff",border:"none",borderRadius:"14px",fontSize:"15px",cursor:"pointer",marginTop:"10px",letterSpacing:"0.5px"},onClick:()=>set({view:"resources"})},"📺 Resources"));

  wrap.appendChild(inner);
  return wrap;
}

function renderDetail(){
  const m=MS.find(x=>x.key===state.activeM);
  const entry=getEntry(m.key);
  const wrap=el("div",{style:{minHeight:"100vh",background:m.light}});

  wrap.appendChild(el("div",{style:{background:m.color,color:"#fff",padding:"20px 16px 16px"}},[
    backBtn("← Back",()=>set({view:"home"})),
    el("div",{style:{fontSize:"36px"}},m.emoji),
    el("h2",{style:{margin:"4px 0 0",fontSize:"24px"}},m.label),
    el("p",{style:{margin:"4px 0 0",opacity:"0.85",fontSize:"13px"}},state.selDate)
  ]));

  const inner=el("div",{style:{padding:"16px",maxWidth:"600px",margin:"0 auto"}});

  // Reflection card
  const reflCard=el("div",{className:"card"},[
    el("p",{style:{color:m.color,fontWeight:"bold",fontSize:"14px",marginBottom:"8px"}},"✦ Today's Reflection"),
    el("p",{style:{color:"#444",fontSize:"14px",lineHeight:"1.6",margin:"0 0 12px"}},m.prompt),
  ]);
  const reflTA=el("textarea",{style:{width:"100%",minHeight:"120px",border:`2px solid ${m.accent}`,borderRadius:"10px",padding:"12px",fontSize:"14px",resize:"vertical",boxSizing:"border-box",outline:"none",color:"#333"},placeholder:"Write your thoughts here..."},null);
  reflTA.value=entry.thoughts||"";
  reflTA.addEventListener("input",e=>updField(m.key,"thoughts",e.target.value));
  reflCard.appendChild(reflTA);
  inner.appendChild(reflCard);

  // Application card
  const appCard=el("div",{className:"card"},[
    el("p",{style:{color:m.color,fontWeight:"bold",fontSize:"14px",marginBottom:"4px"}},"✦ Application Steps"),
    el("p",{style:{color:"#888",fontSize:"13px",lineHeight:"1.5",margin:"0 0 14px"}},m.appPrompt),
  ]);
  renderCheckboxList(appCard,entry.applications||[],m,m.key);
  inner.appendChild(appCard);
  wrap.appendChild(inner);
  return wrap;
}

function renderCheckboxList(parent,items,m,mKey){
  const listWrap=el("div",{});
  items.forEach((a,i)=>{
    const row=el("div",{style:{display:"flex",alignItems:"flex-start",gap:"10px",marginBottom:"10px",padding:"10px 12px",background:a.checked?m.light:"#f9fafb",borderRadius:"10px",border:`1px solid ${a.checked?m.accent:"#e5e7eb"}`}},[
      el("div",{style:{width:"20px",height:"20px",borderRadius:"5px",border:`2px solid ${a.checked?m.accent:"#d1d5db"}`,background:a.checked?m.accent:"#fff",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:"0",marginTop:"1px"},onClick:()=>{
        const apps=[...getEntry(mKey).applications];
        apps[i]={...apps[i],checked:!apps[i].checked};
        updField(mKey,"applications",apps);
      }},a.checked?el("span",{style:{color:"#fff",fontSize:"13px",lineHeight:"1"}},"✓"):null),
      el("span",{style:{flex:1,fontSize:"14px",color:a.checked?"#6b7280":"#333",textDecoration:a.checked?"line-through":"none",lineHeight:"1.5"}},a.text),
      el("button",{style:{background:"none",border:"none",color:"#d1d5db",cursor:"pointer",fontSize:"16px",padding:"0",lineHeight:"1",flexShrink:"0"},onClick:()=>{
        const apps=getEntry(mKey).applications.filter((_,j)=>j!==i);
        updField(mKey,"applications",apps);
      }},"×")
    ]);
    listWrap.appendChild(row);
  });
  const inputRow=el("div",{style:{display:"flex",gap:"8px",marginTop:"4px"}});
  const inp=el("input",{type:"text",placeholder:"Add an application step...",style:{flex:1,border:`2px solid ${m.accent}`,borderRadius:"10px",padding:"9px 12px",fontSize:"14px",outline:"none",color:"#333"}},null);
  inp.addEventListener("keydown",e=>{if(e.key==="Enter"){addApp();}});
  const addBtn=el("button",{style:{background:m.accent,color:"#fff",border:"none",borderRadius:"10px",padding:"9px 16px",fontSize:"14px",cursor:"pointer",fontWeight:"bold"},onClick:()=>addApp()},"+");
  function addApp(){const t=inp.value.trim();if(!t)return;const apps=[...getEntry(mKey).applications,{id:Date.now(),text:t,checked:false}];updField(mKey,"applications",apps);inp.value="";}
  inputRow.appendChild(inp);inputRow.appendChild(addBtn);
  parent.appendChild(listWrap);
  parent.appendChild(inputRow);
}

function renderProgress(){
  const tabs=["overview","reflections","outcomes","others"];
  const wrap=el("div",{style:{minHeight:"100vh",background:"#f8f5ff"}});
  const hdr=el("div",{style:{background:"#3b0764",color:"#fff",padding:"20px 16px 0"}});
  hdr.appendChild(backBtn("← Back",()=>set({view:"home"})));
  hdr.appendChild(el("h2",{style:{margin:0,fontSize:"22px"}},"📊 Progress"));
  hdr.appendChild(el("p",{style:{margin:"4px 0 16px",opacity:"0.8",fontSize:"13px"}},"Your faith journey overview"));
  const tabRow=el("div",{style:{display:"flex",gap:"4px",overflowX:"auto"}});
  tabs.forEach(t=>{
    tabRow.appendChild(el("button",{style:{padding:"10px 16px",background:state.sumTab===t?"#fff":"transparent",color:state.sumTab===t?"#3b0764":"rgba(255,255,255,0.75)",border:"none",borderRadius:"10px 10px 0 0",cursor:"pointer",fontSize:"13px",fontWeight:state.sumTab===t?"bold":"normal",whiteSpace:"nowrap"},onClick:()=>set({sumTab:t})},t.charAt(0).toUpperCase()+t.slice(1)));
  });
  hdr.appendChild(tabRow);
  wrap.appendChild(hdr);

  const inner=el("div",{style:{padding:"16px",maxWidth:"600px",margin:"0 auto"}});

  if(state.sumTab==="overview") renderOverview(inner);
  else if(state.sumTab==="reflections") renderReflections(inner);
  else if(state.sumTab==="outcomes") renderOutcomes(inner);
  else if(state.sumTab==="others") renderOthers(inner);

  wrap.appendChild(inner);
  return wrap;
}

function renderOverview(inner){
  const weekDates=getWeekDates();
  // Backup card
  const bkCard=el("div",{className:"card"});
  bkCard.appendChild(el("p",{style:{color:"#3b0764",fontWeight:"bold",fontSize:"15px",margin:"0 0 6px"}},"🗄 Backup & Restore"));
  bkCard.appendChild(el("p",{style:{color:"#888",fontSize:"13px",margin:"0 0 14px",lineHeight:"1.5"}},"Export your data to back it up or transfer to another device."));
  const bRow=el("div",{style:{display:"flex",gap:"8px"}});
  bRow.appendChild(el("button",{style:{flex:1,padding:"10px 0",background:"#3b0764",color:"#fff",border:"none",borderRadius:"10px",fontSize:"14px",cursor:"pointer",fontWeight:"bold"},onClick:()=>{

  } else {
    resources.forEach(r=>{
      const card=el("div",{style:{background:"#fff",borderRadius:"14px",marginBottom:"12px",overflow:"hidden",boxShadow:"0 2px 8px rgba(0,0,0,0.07)",border:"2px solid #e5e7eb"}});
      card.appendChild(el("div",{style:{display:"flex",gap:"12px",padding:"14px 14px 10px",alignItems:"center"}},[
        el("div",{style:{flexShrink:"0",width:"52px",height:"52px",borderRadius:"12px",background:"#dcfce7",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"26px"}},"▶️"),
        el("div",{style:{flex:1,minWidth:0}},[
          el("p",{style:{margin:"0 0 4px",fontSize:"14px",color:"#333",fontWeight:"bold",lineHeight:"1.4"}},r.desc||"Untitled video"),
          el("p",{style:{margin:0,fontSize:"11px",color:"#86efac",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},r.url)
        ])
      ]));
      const btnBar=el("div",{style:{display:"flex",borderTop:"1px solid #f0fdf4"}});
      const openA=el("a",{href:r.url,style:{flex:1,padding:"11px 0",background:"#14532d",color:"#fff",fontSize:"12px",fontWeight:"bold",textAlign:"center",display:"block"}},"▶ Open");
      const newTabA=el("a",{href:r.url,target:"_blank",rel:"noopener noreferrer",style:{flex:1,padding:"11px 0",background:"#166534",color:"#fff",fontSize:"12px",fontWeight:"bold",textAlign:"center",display:"block"}},"▶ New Tab");
      const editBtn=el("button",{style:{flex:1,padding:"11px 0",background:"#f0fdf4",color:"#14532d",border:"none",fontSize:"12px",cursor:"pointer"},onClick:()=>set({resEditId:r.id,resUrl:r.url,resDesc:r.desc})},"Edit");
      const delBtn=el("button",{style:{flex:1,padding:"11px 0",background:"#f0fdf4",color:"#ef4444",border:"none",fontSize:"12px",cursor:"pointer"},onClick:()=>saveList("__resources",resources.filter(x=>x.id!==r.id))},"Delete");
      const div1=el("div",{style:{width:"1px",background:"#166534"}},null);
      const div2=el("div",{style:{width:"1px",background:"#e5e7eb"}},null);
      const div3=el("div",{style:{width:"1px",background:"#e5e7eb"}},null);
      btnBar.appendChild(openA);btnBar.appendChild(div1);btnBar.appendChild(newTabA);btnBar.appendChild(div2);btnBar.appendChild(editBtn);btnBar.appendChild(div3);btnBar.appendChild(delBtn);
      card.appendChild(btnBar);
      inner.appendChild(card);
    });
  }
  wrap.appendChild(inner);
  return wrap;
}

function render(){
  const app=document.getElementById("app");
  app.innerHTML="";
  let view;
  if(state.view==="home") view=renderHome();
  else if(state.view==="detail") view=renderDetail();
  else if(state.view==="progress") view=renderProgress();
  else if(state.view==="resources") view=renderResources();
  app.appendChild(view);
}

render();
</script>
</body>
</html>
